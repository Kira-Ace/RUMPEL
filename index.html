<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RUMPEL</title>

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">

  <!-- styles -->
  <link rel="stylesheet" href="css/vars.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/desk.css">
  <link rel="stylesheet" href="css/tray.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/stage2.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
 
<!-- grain -->
<svg class="noise-overlay" xmlns="http://www.w3.org/2000/svg">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>

<div id="app">

  <!-- stage 1 -->
  <div id="s1" style="display:flex;flex-direction:column;flex:1;overflow:hidden">

<!-- 
    <div class="banner">
      <div class="banner-tag">⚡ Scenario</div>
      <div class="banner-title">
        CS Midterm in 3 days.<br>
        <em>Build your workspace.</em>
      </div>
      <div class="banner-sub">
        Tap a block below → drag, resize, write. Your layout shapes your plan.
      </div>
    </div> -->

    <!-- desk -->
    <div id="desk">
      <div class="empty-hint" id="hint">
        <span class="hint-txt">Your desk is empty.<br>Add a block below ↓</span>
      </div>
    </div>

    <!-- cta -->
    <div class="cta">
      <div class="cta-lbl" id="counter">Empty desk</div>
      <button class="cta-btn" id="startBtn" onclick="startStudying()" disabled>
        POST IT →
      </button>
    </div>

    <!-- tray -->
    <div id="tray">
      <div class="tray-head">Stationeries</div>
      <div class="tray-row" id="trayRow">

        <!-- create -->
        <div class="chip chip-create" onclick="openCustomModal()">
          <div class="chip-create-icon">+</div>
          <div class="chip-nm">Create</div>
        </div>

        <!-- injected -->
      </div>
    </div>
  </div>



  <!-- modal -->
  <div id="custom-modal" role="dialog" aria-modal="true" aria-label="Design custom block">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Design <em>your block</em></h2>

      <div class="field">
        <label class="field-lbl" for="customName">Block name</label>
        <input type="text" id="customName" class="field-input"
               placeholder="e.g. Formula Sheet, Weak Topics..." autocomplete="off">
      </div>

      <div class="field">
        <label class="field-lbl" for="customType">Mechanism</label>
        <select id="customType" class="field-select">
          <option value="freetext">Text Pad — free-form writing</option>
          <option value="checklist">Checklist — actionable items</option>
          <option value="focus">Focus Block — objective + notes</option>
          <option value="display">Display — static label</option>
        </select>
      </div>

      <div class="field">
        <label class="field-lbl">Color</label>
        <div class="swatch-row" id="swatchRow"></div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCustomModal()">Cancel</button>
        <button class="btn-create" onclick="saveCustom()">Create & Place</button>
      </div>
    </div>
  </div>


  <!-- morph -->
  <div id="morph" aria-live="polite">
    <div class="morph-dots">
      <div class="morph-dot"></div>
      <div class="morph-dot"></div>
      <div class="morph-dot"></div>
    </div>
    <div class="morph-msg" id="morphMsg">Reading your layout...</div>
  </div>


  <!-- stage 2 -->
  <div id="s2" role="main" aria-label="Your study plan">

    <!-- archetype -->
    <div id="archetype-panel" data-letter="?">
      <!-- injected -->
    </div>

    <!-- tabs -->
    <div class="day-tabs" id="dayTabBar" role="tablist">
      <!-- injected -->
    </div>

    <!-- canvas -->
    <div id="planCanvases" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <!-- injected -->
    </div>

    <!-- footer -->
    <div class="s2-footer">
      <button class="s2-btn" onclick="goBack()">← Redesign</button>
      <button class="s2-btn primary">Use this plan →</button>
    </div>
  </div>

</div>

<!-- scripts -->
<script src="js/config.js"></script>
<script src="js/drag.js"></script>
<script src="js/resize.js"></script>
<script src="js/items.js"></script>
<script src="js/tray.js"></script>
<script src="js/modal.js"></script>
<script src="js/collect.js"></script>
<script src="js/stage2.js"></script>
<script src="js/main.js"></script>

</body>
</html>
